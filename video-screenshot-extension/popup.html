<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频播放器截图工具</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 标题区域 -->
    <header class="header">
      <h1 class="title">🎬 视频截图工具</h1>
      <p class="subtitle">点击播放器进行截图</p>
    </header>

    <!-- 扫描按钮区域 -->
    <div class="scan-section">
      <button id="scanBtn" class="btn btn-primary">
        <span class="icon">🔍</span>
        <span class="text">扫描视频播放器</span>
      </button>
      <div id="scanStatus" class="status-text"></div>
    </div>

    <!-- 播放器列表区域 -->
    <div id="playersSection" class="players-section" style="display: none;">
      <h2 class="section-title">检测到的播放器</h2>
      <ul id="playersList" class="players-list">
        <!-- 动态生成的播放器列表 -->
      </ul>
    </div>

    <!-- 空状态 -->
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">📹</div>
      <p class="empty-text">未检测到视频播放器</p>
      <p class="empty-hint">请在包含视频的页面上使用此工具</p>
    </div>

    <!-- 加载状态 -->
    <div id="loadingState" class="loading-state" style="display: none;">
      <div class="spinner"></div>
      <p class="loading-text">正在处理截图...</p>
    </div>

    <!-- 结果提示 -->
    <div id="resultMessage" class="result-message" style="display: none;"></div>

    <!-- 底部工具栏 -->
    <footer class="footer">
      <button id="settingsBtn" class="btn btn-text">
        <span class="icon">⚙️</span>
        <span>设置</span>
      </button>
      <button id="helpBtn" class="btn btn-text">
        <span class="icon">❓</span>
        <span>帮助</span>
      </button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
